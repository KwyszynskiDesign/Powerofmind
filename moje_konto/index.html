			/* ============================================
   🔧 NAPRAW SCROLL - OSTATECZNE ROZWIĄZANIE
   ============================================ */

/* Podstawowe ustawienia dla HTML i BODY */
html,
html.scroll,
html.ast-scroll-locked,
html.modal-open,
html[style*="overflow"],
html[style] {
    overflow: visible !important;
   overflow-x: hidden !important; 
    height: auto !important;

    max-width: 100vw !important;
    scroll-behavior: smooth !important;
}

body,
body.ast-scroll-locked,
body.modal-open,
body[style*="overflow: hidden"],
body[style*="overflow"],
body[style] {
    overflow: visible !important;
  overflow-x: hidden !important; 
	overscroll-behavior: auto !important;  
    height: auto !important;
    min-height: 100vh !important;
    position: static !important;
    max-width: 100vw !important;
    padding-top: 0 !important;
    margin-top: 0 !important;
}

/* Napraw kontener Elementora */
.elementor,
.elementor-location-header {
    overflow: visible !important;
    height: auto !important;
}

/* Napraw wrapper który blokuje scroll */
.ewa-section-wrapper {
    height: auto !important;
    min-height: auto !important;
    overflow: visible !important;
}









/* UKRYJ HEADER ASTRY - POPRAWNIE (nie blokuje eventów scrolla) */
.site-header,
#masthead,
.ast-mobile-header-wrap,
.ast-desktop-header-content {
    display: none !important;
    pointer-events: none !important;
    height: 0 !important;
    min-height: 0 !important;
    overflow: hidden !important;
    visibility: hidden !important;
}

















/* UNIWERSALNY RESET – dla wszystkich przyszłych sekcji */
a[class*="ewa-"][class*="-btn-"] {
  text-decoration: none !important;
}

/* Uniwersalny selektor dla tytułów akordeonów */
.accordion-title,
.accordion-button,
.elementor-tab-title,
.wp-block-details summary,
details summary {
  color: #2c4053;
  transition: color 0.3s ease;
}

/* Tytuł świeci się po otwarciu */
.accordion-item.active .accordion-title,
.accordion-item.active .accordion-button,
.elementor-accordion-item.elementor-active .elementor-tab-title,
.wp-block-details[open] summary,
details[open] summary {
  color: #00D9B5 !important;
}

/* responsywne tytuły */
.responsive-title {
  font-size: clamp(24px, 6vw, 32px);
  line-height: 1.2;
  text-align: center;
  max-width: 90%;
  margin: 0 auto;
  word-break: break-word;
}

/* ============================================
   CYTAT STG
   ============================================ */

/* GŁÓWNY KONTENER */
.quote-box {
  position: relative;
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 40px;
  text-align: center;
}

/* CUDZYSŁOWY – domyślnie układ absolutny względem .quote-box */
.quote-box .open,
.quote-box .close {
  position: absolute;
  font-size: 60px;
  color: #444;
  opacity: 0.3;
  z-index: 2;
  pointer-events: none;
}

/* Otwierający */
.quote-box .open {
  top: -20px;
  left: -20px;
}

/* Zamykający */
.quote-box .close {
  bottom: -20px;
  right: -20px;
}

/* ŚRODKOWY KONTENER */
.quote-box .box {
  position: relative;
  z-index: 3;
}

/* Responsywność */
@media (max-width: 1024px) {
  .quote-box { 
    padding: 40px 20px; 
  }

  .quote-box .open,
  .quote-box .close { 
    font-size: 40px; 
  }

  .quote-box .open { 
    top: -10px; 
    left: -10px; 
  }

  .quote-box .close { 
    bottom: -10px; 
    right: -10px; 
  }
}

/* ============================================
   KONTAKT SECTION
   ============================================ */

.kontakt-section {
  display: flex;
  gap: 40px;
  align-items: flex-start;
  justify-content: center;
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 16px 40px 16px;
}

.kontakt-section .kontakt-lewa,
.kontakt-section .kontakt-prawa {
  flex: 1 1 340px;
  min-width: 260px;
}

/* clamp na fontach */
.kontakt-prawa h2,
.kontakt-lewa h2 {
  font-size: clamp(23px, 4vw, 34px);
  margin-bottom: 22px;
}

.kontakt-prawa .kontakt-info,
.kontakt-prawa .kontakt-social {
  font-size: clamp(14px, 2vw, 20px);
}

/* SOCIAL - margines dolny */
.kontakt-prawa .kontakt-social {
  margin-bottom: clamp(16px, 3vw, 30px);
}

/* SOCIAL - napis */
.kontakt-prawa .kontakt-social-tytul {
  font-size: clamp(14px, 1.3vw, 19px);
  margin-bottom: 8px;
  font-weight: 500;
}

/* TABLET: dopiero poniżej 780px układ pionowy */
@media (max-width: 780px) {
  .kontakt-section {
    flex-direction: column;
    gap: 32px;
    align-items: stretch;
  }

  .kontakt-section .kontakt-lewa,
  .kontakt-section .kontakt-prawa {
    min-width: 0;
    max-width: 100%;
  }
}

/* MOBILE - padding, marginesy, środkowanie */
@media (max-width: 500px) {
  .kontakt-section { 
    padding: 36px 5vw 26px 5vw; 
  }

    text-align: center; 
  }

  transform: translateY(0);
